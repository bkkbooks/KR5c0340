body:
  text: 金木萬靈論余覽養生之書鳩集久視之方曾所披涉篇目已千餘卷矣莫不還丹金液為大要焉然則此二事蓋中品上仙妙也服之不仙則古無仙矣往者中國喪亂奔波而出余周遊豫荊廣江襄數百州之內窺見流俗道士約數百矣或素聞其名乃在雲表者然率相似如一也各各有數卷仙書並悉不解之徒富畜耳時有行氣斷穀者服諸草藥法略為同文人無不有云道機科條以此為正祕乃云是尹喜所造余告之曰此是魏世軍督王圖所撰非古人也王圖子不曉大藥之妙只欲行氣入室求仙作此道機謂道畢於此乃誤之甚也余問諸道士神丹金液之事及三聖祕要之訣天地神祇之法了無知者其於誇誕自譽誑人云久壽及曾與仙人遊者將太半矣得盡微者殊鮮或有聞金丹而不為金作皆言上古已來仙人乃當曉之又云無此事又云其不得真經矣或得資道救病雜丹碎方便云丹法盡於此矣昔左元放於天柱山中精思而神人授之以金丹仙經會漢末大亂不遑合服而渡江欲投諸郡後於潛山修道余從祖仙翁又從左元放授之太清丹經三卷及九鼎經一卷金液經一卷余師鄭君鄭君是從祖仙翁之弟子也又於從祖以授鄭君鄭君授余故道士了無知者然受之二十年矣資無擔石難以為之畜積長久耳藏金盈匱聚錢如山復不知有此不死之藥縱令聞之亦無一信夫啜玉飴則去漿荇之薄味覩崑崙則去丘墟之下卑余既覽金丹之道則使人不復視小小方書然不可卒得辦為之者宜誓行積德也尚且小益終不能遂長生耳故老君訣云不得還丹金液徒自苦耳夫五穀猶能活人得之則生絶之則死而況中品上仙之神藥豈不益人乎豈不萬億於五穀邪夫神丹之為靈服之逾妙此二藥鍊體質故令人不死此乃豈是食物之精耶以自堅固也又如脂不滅火矣且銅青塗腳入水不腐此是借銅之功以銲其肉金入身活固營衛亦須銅青外傳也世間不信至道實甚翛翛然萬一時遇有好事者復不可遇此法不值先學無由聞世間美事余略述丹法以示後勤志同而求之不可守褻近而求度世且一卮酒不妨九醞之醇然小丹者猶自豈遠草木之上也凡草木藥燒之即燼而丹砂鍊之成水銀即變為還丹法去凡藥亦遠矣故能令人長生神丹獨見此理豈去俗人一何歸懇乎世人少識多所惑不知水銀出於丹砂告之尚不信悟或比喻其仙道而大笑之不亦愚乎上古真仙愍念將來可教者故委曲其說長生不死至矣然俗人終有不知不信造化九變日月所成皆如方也真人可以知此不可以庸夫淺近思求耳余少好方術苦心請問不憚嶮遠每有異聞則喜意求請縱被毀棄不敢為憾安知未來者之不如今也是以著此以示識者豈崇飾哉且盛陽不能榮枯木上智不能移下愚方為賢者傳法為識者貴庸夫得雕弓以驅鳥夷人得喪服將負稚夫不知者亦何足云哉金精石液不曰還丹術余昔聞於鄭君曰人之權輿陰精陽精陽精魂立陰精魄成二精相薄而生神明神以形用形以神生神之云逝形必斯斃神以道全形以術延道隱無名術彰有實有實而術自行無名而道自成道成而神自全術行而形自延夫術有俯仰屈伸胎息咽津御少女以還精餌朱兒以存身延身之術取金之精合石之液結為夫婦列為魂魄一體混沌兩情感激夫一陰一陽謂之道一金一石謂之丹石乘陽而熱金乘陰而寒其服食也取壯陽而伏陰其徵應也俾魂壯而魄殫類水流而趨濕若火動而赴乾如此之謂其金木之靈何可議也
